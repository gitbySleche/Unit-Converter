<DOCTYPE! html>


<html>
	<body>
		
		<h1>Unit Converter</h1>
		
		Choose an SI unit: <button onclick="window.location.href='/length'">Length</button> <button onclick="window.location.href='/weight'">Weight</button> <button onclick="window.location.href='/temperature'">Temperature</button> <br><br>
		
		<form action="/length" method="post">
		
			<label for="value">Enter the value to convert:</label>
				<input type="text" id="value" name="length_value"><br><br>
			
			<label for="units_from">Unit to convert from:</label>
				<select id="units_from" name="length_units_from">
					<option value="millm">millimeter</option>	
					<option value="centm">centimeter</option>
					<option value="meter">meter</option>
					<option value="kilom">kilometer</option>
					<option value="inch">inch</option>
					<option value="foot">foot</option>
					<option value="yard">yard</option>
					<option value="mile">mile</option>
				</select><br><br>
			<label for="units_to">Unit to convert to:</label>
				<select id="units_to" name="length_units_to">
					<option value="millm">millimeter</option>	
					<option value="centm">centimeter</option>
					<option value="meter">meter</option>
					<option value="kilom">kilometer</option>
					<option value="inch">inch</option>
					<option value="foot">foot</option>
					<option value="yard">yard</option>
					<option value="mile">mile</option>
				</select><br><br>
			<input type="submit" value="Convert">
		</form>
		
		{% if result %}
			Result: {{result }}
		{% endif %}
		
	</body>
	
</html>
